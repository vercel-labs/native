name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  zig:
    name: Zig Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build test
      - run: zig build validate

  macos-webview:
    name: macOS WebView
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build test-webview-system-link
      - run: zig build test-webview-smoke
      - run: zig build test-gpu-dashboard-smoke
      - run: zig build test-gpu-components-smoke

  linux-webkitgtk:
    name: Linux WebKitGTK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install WebKitGTK dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev
      - run: zig build test-webview-system-link -Dplatform=linux

  windows-webview:
    name: Windows WebView
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build test-webview-system-link -Dplatform=windows

  cef-platform-tooling:
    name: CEF Platform Tooling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build test-tooling

  npm-package:
    name: npm Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm --prefix packages/zero-native run version:check
      - run: npm --prefix packages/zero-native run scripts:check

  native-examples:
    name: Native Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install GTK dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev
      - run: zig build test-examples-native

  linux-canvas-smoke:
    name: Linux Canvas Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install GTK and Xvfb
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev xvfb
      - name: Build and drive ui-inbox headless
        run: |
          set -euo pipefail
          zig build
          cd examples/ui-inbox
          zig build -Dplatform=linux -Dweb-engine=system -Dautomation=true
          rm -rf .zig-cache/zero-native-automation
          xvfb-run -a ./zig-out/bin/ui-inbox &
          pid=$!
          trap 'kill "$pid" >/dev/null 2>&1 || true' EXIT
          cli=../../zig-out/bin/zero-native
          "$cli" automate wait | grep -q 'ready=true'
          snap=.zig-cache/zero-native-automation/snapshot.txt
          for i in $(seq 1 50); do
            grep -q 'gpu_nonblank=true' "$snap" && break
            sleep 0.2
          done
          grep -q 'gpu_nonblank=true' "$snap"
          grep -q 'gpu_backend=software' "$snap"
          add=$(grep -o 'widget @w1/inbox-canvas#[0-9]* role=button name="Add task"' "$snap" | grep -o '#[0-9]*' | tr -d '#')
          "$cli" automate widget-click inbox-canvas "$add"
          for i in $(seq 1 50); do
            grep -q '4 open' "$snap" && break
            sleep 0.2
          done
          grep -q '4 open' "$snap"
          "$cli" automate screenshot inbox-canvas
          test -s .zig-cache/zero-native-automation/screenshot-inbox-canvas.png

  frontend-examples:
    name: Frontend Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build test-examples-frontends

  mobile-examples:
    name: Mobile Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build test-examples-mobile

  scaffold:
    name: Generated App Scaffolds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build
      - name: Scaffold and test frontend templates
        run: |
          set -euo pipefail
          for frontend in native next vite react svelte vue; do
            app=".zig-cache/scaffold-${frontend}"
            rm -rf "$app"
            ./zig-out/bin/zero-native init "$app" --frontend "$frontend"
            (cd "$app" && zig build test -Dplatform=null && ../../zig-out/bin/zero-native validate app.zon)
          done

  evals-typecheck:
    name: Evals Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
          package_json_file: evals/package.json
      - run: pnpm install --frozen-lockfile
        working-directory: evals
      - run: pnpm typecheck
        working-directory: evals

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
          package_json_file: docs/package.json
      - run: pnpm install --frozen-lockfile
        working-directory: docs
      - run: pnpm check
        working-directory: docs
